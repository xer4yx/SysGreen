name: Installer

# Builds the Velopack release (ADR-0009 / Tier 4 #15): publishes the app self-contained and runs
# `vpk pack` to produce Setup.exe + full/delta packages + the release feed. On a v* tag it attaches
# them all to a DRAFT GitHub Release — which is both the installer download AND the self-update feed
# the app reads (VelopackUpdateService). A maintainer publishes the draft when ready.
# Verified by reading this Actions run. Heavier than per-PR CI, so it runs on demand and on v* tags.

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: true

# Needed for the release step to create/attach assets on a tag.
permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # build.ps1 publishes self-contained and runs vpk pack (installing the Velopack CLI if needed).
      - name: Build Velopack release
        run: pwsh -File installer/build.ps1

      # Run artifact: for developers/CI (login-gated, expires) — not the consumer channel.
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: SysGreen-velopack
          path: artifacts/releases/*
          if-no-files-found: error

      # On a version tag, attach the full Velopack release (Setup.exe + packages + feed) to a DRAFT
      # GitHub Release — the channel users install from and the app self-updates from. A maintainer
      # reviews and clicks Publish.
      - name: Attach release to draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/releases/* \
            --draft --title "SysGreen $GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" artifacts/releases/* --clobber
