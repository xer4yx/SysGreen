name: Installer

# Builds the per-machine Windows installer (ADR-0009 / Tier 4 #15): publishes the app self-contained
# and compiles installer/SysGreen.iss with Inno Setup into Setup.exe, uploaded as a build artifact.
# Verified the same way as the CI slice — by reading this Actions run. Runs on demand and on v* tags
# (it's heavier than the per-PR CI: a self-contained WPF publish + installer compile).

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: true

# Needed for the release step to create/attach the Setup.exe on a tag.
permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: pwsh -File installer/build.ps1

      # Run artifact: for developers/CI (login-gated, expires) — not a consumer channel.
      - name: Upload Setup.exe
        uses: actions/upload-artifact@v7
        with:
          name: SysGreen-setup
          path: artifacts/installer/*.exe
          if-no-files-found: error

      # Fixed-name copy so the landing page can link to .../releases/latest/download/SysGreen-Setup.exe
      # without being updated on every release (the built asset name carries the version).
      - name: Copy fixed-name installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: cp artifacts/installer/*.exe artifacts/installer/SysGreen-Setup.exe

      # On a version tag, attach Setup.exe to a GitHub Release — the channel end users install from.
      # Created as a DRAFT so a maintainer reviews and clicks Publish; drop --draft to auto-publish.
      - name: Attach installer to draft release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/installer/*.exe \
            --draft --title "SysGreen $GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" artifacts/installer/*.exe --clobber
